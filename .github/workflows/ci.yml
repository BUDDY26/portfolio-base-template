# .github/workflows/ci.yml
#
# CI Pipeline — runs on every push and pull request.
# Adjust the job steps below to match your language and toolchain.
# This template is pre-configured for Python with pytest and ruff/black.
# See comments marked [TYPESCRIPT] for the Node.js equivalent.

name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── Lint and Format ──────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          pip install ruff black

      - name: Run ruff (linter)
        run: ruff check src/ tests/

      - name: Run black (formatter check)
        run: black --check src/ tests/

      # ── [TYPESCRIPT] Uncomment and replace Python steps above ─────────────
      # - name: Set up Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: "20"
      #     cache: "npm"
      # - name: Install dependencies
      #   run: npm ci
      # - name: Run ESLint
      #   run: npx eslint src/ tests/
      # - name: Run Prettier check
      #   run: npx prettier --check .

  # ── Test Suite ───────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        # [TYPESCRIPT]: replace matrix with node-version: ["18", "20"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pip install pytest pytest-cov
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.11'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      # ── [TYPESCRIPT] Replace test steps above with: ────────────────────────
      # - name: Install dependencies
      #   run: npm ci
      # - name: Run tests
      #   run: npm test -- --coverage

  # ── Structure Validation ─────────────────────────────────────────────────────
  validate-structure:
    name: Validate Repo Structure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/bootstrap.sh scripts/validate-structure.sh

      - name: Run structure validator (strict)
        run: bash scripts/validate-structure.sh --strict

  # ── Security Scan ────────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    # Only run on pushes to main — not every PR to keep things fast
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run bandit (Python security linter)
        run: |
          pip install bandit
          bandit -r src/ -ll --exit-zero

      # ── [TYPESCRIPT] Replace with: ─────────────────────────────────────────
      # - name: Run npm audit
      #   run: npm audit --audit-level=high
